<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="petal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3d9;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ff6b9d;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <!-- 主背景圆 -->
  <circle cx="50" cy="50" r="46" fill="url(#grad)" opacity="0.12"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#grad)" stroke-width="2.5" opacity="0.6"/>
  <!-- 樱花花瓣装饰 -->
  <g transform="translate(50,50) scale(0.9)">
    <!-- 5片樱花花瓣 -->
    <ellipse cx="0" cy="-18" rx="8" ry="14" fill="url(#petal-grad)" transform="rotate(0)" opacity="0.85"/>
    <ellipse cx="0" cy="-18" rx="8" ry="14" fill="url(#petal-grad)" transform="rotate(72)" opacity="0.85"/>
    <ellipse cx="0" cy="-18" rx="8" ry="14" fill="url(#petal-grad)" transform="rotate(144)" opacity="0.85"/>
    <ellipse cx="0" cy="-18" rx="8" ry="14" fill="url(#petal-grad)" transform="rotate(216)" opacity="0.85"/>
    <ellipse cx="0" cy="-18" rx="8" ry="14" fill="url(#petal-grad)" transform="rotate(288)" opacity="0.85"/>
    <!-- 花心 -->
    <circle cx="0" cy="0" r="6" fill="#fff" opacity="0.95"/>
    <circle cx="0" cy="0" r="4" fill="url(#grad)" opacity="0.7"/>
  </g>
  <!-- MGL 文字 -->
  <text x="50" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="url(#grad)" letter-spacing="1">MGL</text>
  <!-- 小星星装饰 -->
  <circle cx="18" cy="22" r="2" fill="#ffb3d9" opacity="0.8"/>
  <circle cx="82" cy="30" r="1.5" fill="#c084fc" opacity="0.7"/>
  <circle cx="75" cy="78" r="1.8" fill="#38bdf8" opacity="0.6"/>
  <circle cx="25" cy="75" r="1.3" fill="#ff6b9d" opacity="0.7"/>
</svg>
